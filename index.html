<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Clemens Nauta. Business development and mobility strategy." />
  <title>Clemens Nauta</title>

  <!-- Electra CSS (provided) -->
  <link rel="stylesheet" href="https://stations.go-electra.com/mapbox-gl.css">
  <link rel="stylesheet" href="https://stations.go-electra.com/mapbox-gl-geocoder.css">
  <link rel="stylesheet" href="https://stations.go-electra.com/style-1772644641147.css">

  <!-- Electra Font -->
  <link rel="stylesheet" href="https://fonts.axept.io/fonts.googleapis.com/css?family=Source%20Sans%203:regular,500,600,700">

  <style>
    :root{
      --pink:#f5cbe3;
      --blue:#c0e2f5;
      --lilac:#e7cffe;
      --sage:#d6e2de;

      --bg:#fbfbff;
      --text:#0b0f14;
      --muted:rgba(11,15,20,.70);
      --border:rgba(11,15,20,.10);

      --surface:rgba(255,255,255,.78);
      --surface-soft:rgba(255,255,255,.72);

      --shadow-lg:0 24px 70px rgba(11,15,20,.10);
      --shadow-md:0 12px 35px rgba(11,15,20,.08);

      --radius-xl:28px;
      --radius-lg:20px;
      --radius-md:16px;

      --max:1100px;

      --font:"Source Sans 3", ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }

    *{box-sizing:border-box;}
    html,body{height:100%;}
    body{
      margin:0;
      font-family:var(--font);
      color:var(--text);
      line-height:1.6;
      background:
        radial-gradient(900px 520px at 12% 10%, color-mix(in oklab,var(--pink) 60%,transparent),transparent 60%),
        radial-gradient(900px 520px at 88% 16%, color-mix(in oklab,var(--blue) 70%,transparent),transparent 58%),
        radial-gradient(900px 520px at 70% 92%, color-mix(in oklab,var(--lilac) 65%,transparent),transparent 60%),
        radial-gradient(800px 460px at 22% 88%, color-mix(in oklab,var(--sage) 70%,transparent),transparent 58%),
        linear-gradient(180deg,#ffffff 0%,#fbfbff 55%,#ffffff 100%);
    }

    a{color:inherit;text-decoration:none;}
    a:hover{text-decoration:underline;}

    header{
      position:sticky;
      top:0;
      backdrop-filter:blur(14px);
      background:color-mix(in oklab,#ffffff 70%,transparent);
      border-bottom:1px solid var(--border);
      z-index:50;
    }

    .nav{
      max-width:var(--max);
      margin:0 auto;
      padding:16px 20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
    }

    .brand{
      font-weight:700;
      font-size:18px;
      letter-spacing:.2px;
    }

    nav{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
    }

    nav a{
      font-size:14px;
      padding:8px 12px;
      border-radius:999px;
      color:var(--muted);
      transition:.15s ease;
    }

    nav a:hover{
      background:rgba(11,15,20,.05);
      color:var(--text);
      text-decoration:none;
    }

    .btn{
      border:1px solid var(--border);
      background:var(--surface-soft);
      padding:10px 16px;
      border-radius:999px;
      font-weight:600;
      font-size:14px;
      transition:.15s ease;
    }

    .btn:hover{
      background:#fff;
      transform:translateY(-1px);
      text-decoration:none;
    }

    .wrap{
      max-width:var(--max);
      margin:0 auto;
      padding:32px 20px 70px;
    }

    .hero{
      padding:42px;
      border-radius:var(--radius-xl);
      background:
        radial-gradient(900px 260px at 0% 0%,color-mix(in oklab,var(--pink) 55%,transparent),transparent 70%),
        radial-gradient(900px 260px at 100% 10%,color-mix(in oklab,var(--blue) 60%,transparent),transparent 70%),
        var(--surface);
      border:1px solid var(--border);
      box-shadow:var(--shadow-lg);
      margin-bottom:24px;
    }

    h1{
      margin:0 0 12px;
      font-size:clamp(34px,4vw,54px);
      line-height:1.05;
    }

    .subtitle{
      font-size:18px;
      color:var(--muted);
      max-width:820px;
    }

    .chips{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:18px;
    }

    .chip{
      background:var(--surface-soft);
      border:1px solid var(--border);
      padding:8px 14px;
      border-radius:999px;
      font-size:13px;
      font-weight:600;
      color:var(--muted);
    }

    main{
      display:grid;
      grid-template-columns:1.2fr .8fr;
      gap:24px;
    }

    @media(max-width:900px){
      main{grid-template-columns:1fr;}
    }

    section.card{
      padding:28px;
      border-radius:var(--radius-lg);
      background:var(--surface);
      border:1px solid var(--border);
      box-shadow:var(--shadow-md);
    }

    h2{
      margin:0 0 14px;
      font-size:19px;
      font-weight:700;
    }

    p{
      margin:0 0 14px;
      font-size:16px;
      color:var(--muted);
    }

    .grid{
      display:grid;
      gap:12px;
    }

    .item{
      padding:16px;
      border-radius:var(--radius-md);
      background:var(--surface-soft);
      border:1px solid var(--border);
    }

    .kicker{
      font-size:12px;
      color:rgba(11,15,20,.55);
      margin-bottom:6px;
      font-family:monospace;
    }

    .title{
      font-weight:700;
      margin-bottom:6px;
    }

    .desc{
      font-size:15px;
      color:var(--muted);
    }

    .row{
      display:flex;
      justify-content:space-between;
      padding:14px 16px;
      border-radius:var(--radius-md);
      border:1px solid var(--border);
      background:var(--surface-soft);
      font-size:15px;
    }

    footer{
      margin-top:40px;
      padding-top:20px;
      border-top:1px solid var(--border);
      font-size:13px;
      color:rgba(11,15,20,.60);
      display:flex;
      justify-content:space-between;
      flex-wrap:wrap;
      gap:10px;
    }
  </style>
</head>

<body>

<header>
  <div class="nav">
    <div class="brand">C
